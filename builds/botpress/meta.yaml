# Content-collection fields. Perishable facts (version, pricing, verified date)
# are kept separate from the evergreen narrative so they update in one place.
# This file is CANONICAL: site/src/content.config.ts mirrors it exactly. If you
# add a field in one, add it in the other — they must not drift.
#
# STATUS: Define stage (PROCESS §0–1). Structural facts are set; every perishable
# or verdict field is left blank ON PURPOSE until the bot is actually built, tested,
# and live — never claim an unrun test or an un-obtained link.
title: "A support chatbot for Jigg.AI, built with Botpress"   # working title; finalize at draft (PROCESS §4)
slug: "botpress"      # the .mdx filename under site/src/content/builds/ IS the slug
category: "chatbots"
# Three distinct roles — do not merge them:
#   1. tool        the PRIMARY tool under review. The /tools index key AND the
#                  affiliate target. Exactly one per build.
#   2. built_with  the production AIs used to MAKE the build.
#   3. stack       supporting tools/services the build runs on.
# built_with and stack are DISPLAY-ONLY: they never create a /tools entry and are
# never affiliate-linked. That visible link/no-link split is what shows a reader
# which tool is actually under review, without having to explain it.
tool: "Botpress"
tool_version: ""      # omitted on purpose: Botpress is a hosted service (CONTEXT §5 —
                      # don't pin versions on un-versioned hosted services). Note the
                      # underlying answering model here only if Botpress surfaces it
                      # and it's meaningful.
built_with: ["Claude Opus 4.8", "Claude Code"]   # planning, KB copy, test set, draft
                      # (Opus) + island & commits (Claude Code). Botpress's own LLM is
                      # part of the primary tool, NOT a separate built_with.
stack: []             # intentionally empty: this build required no supporting tool
                      # beyond the primary (Botpress Cloud) and the already-built site.
                      # Astro/GitHub/Netlify/Cloudflare are the site's permanent infra —
                      # not inherited onto this build (CONTEXT §5).
runs_on_site: true    # the bot runs live as the site's support widget — the real
                      # dogfood. Only set once it's ACTUALLY live (see status).
status: verified      # Built, tested (26/30, 0 hallucinations), human edit pass signed
                      # off 2026-07-23. Per PROCESS §5 this flag is only set AFTER a
                      # human says so — never on the agent's own say-so.
summary: ""           # citation hook — written at draft stage (PROCESS §4)
test_score: "26/30"   # Run 2. = correct (18) + correctly-declined (8); 4 partial,
                      # 0 hallucinations, adversarial gate 8/8. Run 1 scored 15/30 with
                      # the same bot and a 2-of-8-page KB — see test.md for both runs.
affiliate_url: "https://try.botpress.com/kdi921r4nfra"   # Botpress affiliate link.
                      # Site's FIRST affiliate_url. At publish: confirm it resolves and
                      # that the stamp links Botpress ONLY (not built_with/stack) + the
                      # /tools CTA links out (BACKLOG: link/no-link split unverified live).
repro_pack: false     # flip to true only when the pack is actually assembled.
published: "2026-07-23"
last_verified: "2026-07-23"
pricing_as_of: ""     # YYYY-MM-DD — date Botpress's pricing tier when captured (§9)

# Cost / hosting / framework detail does NOT go in the top stamp — author those as
# fact tiles in the .mdx body so the stamp stays one compact line.

# ---- display + tool-projection helpers (rendered by the site) ----
featured: false       # keep false for now; promoting this to featured at publish
                      # auto-demotes build #1 from the home hero (CONTEXT §6).
meta_line: ""         # short mono index-row detail — fill at draft

# /tools is a PROJECTION of the builds collection — there is no separate tools
# source of truth, so a tool's own facts live on the build. When several builds
# share a tool, the most-recent build's tool_* values win (see site/src/lib/builds.ts).
tool_summary: "No-code chatbot builder, hosted"   # no pricing claim until captured
tool_verdict: "Genuinely good at the thing that matters — it never once made an answer up, across 60 graded questions. The trap is the knowledge base: it silently indexed 2 of my 8 pages and told me nothing, which made a well-behaved bot look stupid until I checked."
accessibility: "Some setup"   # building the bot needs no code, BUT the silent
                      # 2-of-8 KB coverage trap is not something a beginner would
                      # catch — they'd just conclude the bot was bad.

# Anything richer than these flat facts — the honest-process steps, test-stat
# tiles, the reproduce pack, the tool verdict card — is authored in the .mdx BODY
# using the kit in site/src/components/post/ (see its README.md).
